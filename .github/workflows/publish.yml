name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      
      - name: Build for ARM64 (Apple Silicon)
        run: |
          cargo build --release --target aarch64-apple-darwin
          mkdir -p npm/bin
          cp target/aarch64-apple-darwin/release/clipfix npm/bin/clipfix-arm64
      
      - name: Build for x64 (Intel)
        run: |
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/clipfix npm/bin/clipfix-x64
      
      - name: Create universal binary
        run: |
          cd npm/bin
          lipo -create clipfix-arm64 clipfix-x64 -output clipfix
          chmod +x clipfix
          rm clipfix-arm64 clipfix-x64
          cd ../..
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Update version in package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd npm
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\\n');
          "
      
      - name: Publish to npm
        working-directory: ./npm
        run: npm publish --access public
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            npm/bin/clipfix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
